name: Bug report / 错误报告
description: Report a reproducible problem / 反馈可复现的问题
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please do not upload copyrighted journal figures without permission.
        感谢反馈。请勿在未获许可的情况下上传受版权保护的期刊图片。
  - type: textarea
    id: summary
    attributes:
      label: Problem / 问题描述
      description: What happened, and what did you expect? / 实际发生了什么？预期结果是什么？
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction / 复现步骤
      description: Include the command and the smallest shareable example. / 请提供运行命令和最小可分享示例。
      render: shell
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version / Python 版本
      placeholder: "3.12.4"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system / 操作系统
      placeholder: "Windows 11, macOS 15, Ubuntu 24.04"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / 日志
      description: Remove private paths and unpublished data. / 请移除私人路径和未公开数据。
      render: text
